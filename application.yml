spring:
  datasource:
    url: jdbc:mysql://localhost:3306/zhice_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Singapore
    username: root
    password: lusini123
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    openai:
      api-key: {your-API-key}
      # 阿里云百炼
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen3.6-flash
      embedding:
        options:
          # 向量化指定使用国内开源的中文向量模型
          model: text-embedding-v3
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名转换
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境打印 SQL
  global-config:
    db-config:
      id-type: auto # 默认自增 ID，可根据需要改成雪花算法 (assign_id)
      logic-delete-field: deleted # 逻辑删除字段


